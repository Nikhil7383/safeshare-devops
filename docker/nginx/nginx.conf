server {
    listen 80;
    server_name _;

    # Frontend root
    root /usr/share/nginx/html;   # Make sure your frontend build is here
    index index.html index.htm;

    # Frontend files
    location / {
        try_files $uri $uri/ /index.html;  # fallback to index.html for SPA
    }

    # PHP Backend
    location /api/ {
        root /var/www/html;   # PHP backend root
        index index.php index.html;

        # Pass PHP scripts to FastCGI
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass backend:9000;   # PHP-FPM container
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    # Uploads folder
    location /uploads/ {
        alias /var/www/html/uploads/;
        autoindex off;
    }

    # Deny .htaccess or hidden files
    location ~ /\. {
        deny all;
    }
}