<script src="config.js"></script>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard - SafeShare</title>
    <link rel="stylesheet" href="style.css">
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #999;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        button {
            padding: 8px 12px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Teacher Dashboard</h2>
<p>Welcome, <span id="userName"></span></p>

<hr>
<h3>Upload a File</h3>
<input type="file" id="file">
<button onclick="upload()">📤 Upload</button>
<p id="uploadMsg"></p>

<hr>
<h3>All Files</h3>
<table id="filesTable">
    <tr><th>File</th><th>Uploader</th><th>Date</th><th>Download</th></tr>
</table>

<hr>
<button onclick="logout()">🚪 Logout</button>

<script>
function getUser() {
    return JSON.parse(localStorage.getItem("user") || "{}");
}

const user = getUser();
if (!user || user.role !== "teacher") window.location = "index.html";

document.getElementById("userName").innerText = user.name || "Teacher";

// Use API_BASE from config.js
const API = API_BASE;

async function upload() {
    const token = localStorage.getItem("token");
    const fileInput = document.getElementById("file");
    const msg = document.getElementById("uploadMsg");

    if (!fileInput.files.length) {
        msg.innerText = "Please select a file first.";
        return;
    }

    const form = new FormData();
    form.append("file", fileInput.files[0]);

    try {
        const res = await fetch(`${API}/api/upload/upload.php`, {
            method: "POST",
            headers: { "Authorization": "Bearer " + token },
            body: form
        });
        const data = await res.json();
        if (data.status === "success") {
            msg.innerText = "✅ Uploaded: " + data.file;
            loadFiles();
        } else {
            msg.innerText = "❌ Error: " + data.error;
        }
    } catch (e) {
        msg.innerText = "Upload failed: " + e;
    }
}

async function loadFiles() {
    try {
        const res = await fetch(`${API}/api/files/list.php`, {
            headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
        });
        const data = await res.json();
        const table = document.getElementById("filesTable");
        table.innerHTML = `<tr><th>File</th><th>Uploader</th><th>Date</th><th>Download</th></tr>`;
        if (data.status === "success") {
            data.files.forEach(f => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${f.filename}</td>
                    <td>${f.name}</td>
                    <td>${f.uploaded_at || ""}</td>
                    <td><a href="${API}/uploads/${encodeURIComponent(f.filename)}" download>⬇ Download</a></td>
                `;
                table.appendChild(tr);
            });
        } else {
            table.innerHTML += `<tr><td colspan="4">${data.error || "No files"}</td></tr>`;
        }
    } catch (e) {
        console.error("Load error:", e);
    }
}

function logout() {
    localStorage.clear();
    window.location = "index.html";
}

loadFiles();
</script>
</body>
</html>
