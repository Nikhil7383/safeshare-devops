<!DOCTYPE html>
<html>
<head>
    <title>SafeShare - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Login</h2>

<form id="loginForm">
    <input type="email" id="email" placeholder="Email" required><br>
    <input type="password" id="password" placeholder="Password" required><br>
    <button type="submit">Login</button>
</form>

<p>Don't have an account? <a href="register.html">Register</a></p>

<p id="msg"></p>

<script>
const API_BASE = "/api/auth";

document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch(API_BASE + "/login.php", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.status === "success") {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        if (data.user.role === "admin") {
            window.location = "dashboard-admin.html";
        } else if (data.user.role === "teacher") {
            window.location = "dashboard-teacher.html";
        } else {
            window.location = "dashboard-student.html";
        }
    } else {
        document.getElementById("msg").innerText = data.error || "Login failed";
    }
});
</script>

</body>
</html>
