<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Admin Dashboard</h2>

<a href="files.html">View All Files</a>
<button onclick="logout()">🚪 Logout</button>

<table border="1" id="filesTable"></table>

<script>
const API = "/api";

const user = getUser();

async function loadFiles() {
    const res = await fetch(API + "/files/list.php", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    const data = await res.json();

    let html = `<tr><th>ID</th><th>File</th><th>Uploader</th><th>Action</th></tr>`;

    data.forEach(f => {
        html += `<tr>
            <td>${f.id}</td>
            <td>${f.filename}</td>
            <td>${f.name}</td>
            <td><button onclick="deleteFile(${f.id})">❌ Delete</button></td>
        </tr>`;
    });

    document.getElementById("filesTable").innerHTML = html;
}

async function deleteFile(id) {
    if (!confirm("Delete file?")) return;

    await fetch(API + "/files/delete.php?id=" + id, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    loadFiles();
}

function logout() {
    localStorage.clear();
    window.location = "index.html";
}

loadFiles();
</script>

</body>
</html>
